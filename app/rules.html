<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#09110e" />
  <title>قوول | طريقة اللعب - QOOL Rules</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏆</text></svg>">
  <link rel="stylesheet" href="css/styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <style>
    .rule-section { margin-bottom: 24px; padding: 20px 16px; border-radius: 12px; }
    .rule-title { font-size: 1.25rem; font-weight: 900; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .rule-text { font-size: 0.95rem; color: var(--text-primary); line-height: 1.7; margin-bottom: 12px; }
    .rule-highlight { color: var(--clr-warn); font-weight: 800; }
    .tokens-box { background: rgba(255,255,255,0.04); padding: 14px; border-radius: 8px; font-size: 0.9rem; line-height: 1.6; border-inline-start: 4px solid var(--clr-primary); }
  </style>
</head>
<body>
  <div id="app">
    <section class="screen active">
      <header class="nav-header">
        <div class="nav-logo">
          <div class="nav-logo-icon"><span class="material-symbols-outlined">menu_book</span></div>
          <span class="nav-logo-text" id="header-title">طريقة اللعب</span>
        </div>
        <div class="nav-actions">
          <button class="icon-btn" id="btn-lang-rules"><span class="material-symbols-outlined">translate</span></button>
          <button class="icon-btn" id="btn-theme-rules"><span class="material-symbols-outlined theme-icon">light_mode</span></button>
        </div>
      </header>

      <div class="scroll-content">
        <div class="container" style="max-width: 600px; margin: 0 auto;">
           <div id="rules-content"></div>
           
           <a href="index.html" class="btn btn-primary btn-lg btn-full" style="margin-top: 24px; margin-bottom: 40px; text-decoration: none; text-align: center; display: flex; justify-content: center; align-items: center; gap: 8px;">
             <span class="material-symbols-outlined">play_circle</span>
             <span id="btn-play-text">العب الآن</span>
           </a>
        </div>
      </div>
    </section>
  </div>

  <script>
    let currentLang = 'ar';
    let currentTheme = 'dark';
    
    const translations = {
      'ar': {
        'header': 'طريقة اللعب',
        'play_now': 'ابدأ اللعب الآن',
        'r1_title': 'الجولة 1: بينج بونج',
        'r1_desc1': 'تبادلوا الأدوار لاكتشاف الإجابات المخفية من القائمة.',
        'r1_desc2': 'احذروا: <span class="rule-highlight">٣ أخطاء (Strikes)</span> تعني الخروج الفوري لفريقك، وحصول الفريق الآخر على كل نقاط السؤال!',
        'r1_tokens': '<strong>رموز المساعدة (مرة واحدة بالمباراة لكل فريق):</strong><br><br>⚔️ <strong>هجوم (Attack):</strong> أجبر الخصم على تقديم إجابتين صحيحتين متتاليتين.<br><br>☠️ <strong>سرقة المتسلل (Steal):</strong> يمكنك إيقاف دور الخصم وتخطي دوره بمحاولة إجابة واحدة خاطفة. إذا أصبت، تحصل على +١٠٠ نقطة فوراً! أما إذا أخطأت، فتفقد رمز السرقة لبقية المباراة.',
        'r2_title': 'الجولة 2: حرب العائلات',
        'r2_desc1': 'خمنوا أكثر الإجابات شيوعاً من استطلاعات الرأي. كل إجابة صحيحة تزيد من قيمة "البنك" المشترك.',
        'r2_desc2': 'تتضاعف النقاط في البنك تلقائياً مع تقدم أسئلة الجولة (×1، ×1، ×2).',
        'r2_steal': '<span class="rule-highlight">مرحلة السرقة القاتلة:</span> إذا راكم الفريق ٣ أخطاء، يخسر دوره تلقائياً. الفريق الآخر يحصل على فرصة "سرقة الرمق الأخير": إجابة واحدة صحيحة تكفي لسرقة وتفريغ كامل نقاط البنك!',
        'r3_title': 'الجولة 3: أسئلة سريعة',
        'r3_desc1': 'لا توجد أدوار هنا، السرعة هي سيدة الموقف!',
        'r3_desc2': 'أول فريق يجيب بشكل صحيح يحصد النقاط فوراً. أما إذا كانت إجابته خاطئة، فيتحول السؤال للفريق الآخر كفرصة مجانية حرة.'
      },
      'en': {
        'header': 'Official Rulebook',
        'play_now': 'Play TRIO Now',
        'r1_title': 'Round 1: Ping-Pong',
        'r1_desc1': 'Teams take turns attempting to uncover hidden answers on the board.',
        'r1_desc2': 'Beware: <span class="rule-highlight">3 Strikes</span> results in an automatic Knockout, and the opposing team instantly wins all points for that question!',
        'r1_tokens': '<strong>Lifeline Tokens (Once per game per team):</strong><br><br>⚔️ <strong>Attack:</strong> Force the opposing team to give two correct answers in a row. If they miss, they strike out!<br><br>☠️ <strong>Sudden Death Steal:</strong> Interrupt their turn to attempt a steal. Guess right: +100 points immediately. Guess wrong: You lose your token for the rest of the game.',
        'r2_title': 'Round 2: Family Feud',
        'r2_desc1': 'Guess the top survey answers. Correct answers deposit points into the central "Bank".',
        'r2_desc2': 'The Bank\'s point values multiply as the round progresses (1x, 1x, 2x).',
        'r2_steal': '<span class="rule-highlight">The Steal Phase:</span> If a team accumulates 3 strikes, control passes. The opposing team gets ONE chance to give a valid answer to steal the ENTIRE built-up Bank!',
        'r3_title': 'Round 3: Fast Questions',
        'r3_desc1': 'No turns, pure adrenaline! First to buzz in with the right answer wins.',
        'r3_desc2': 'The first team to correctly lock in their answer gets +40 points. If they guess incorrectly, the other team gets a free "rebound" attempt.'
      }
    };

    function renderRules() {
      const t = translations[currentLang];
      document.getElementById('header-title').textContent = t['header'];
      document.getElementById('btn-play-text').textContent = t['play_now'];
      
      const content = `
        <div class="card rule-section">
          <div class="rule-title" style="color:var(--clr-primary);"><span class="material-symbols-outlined">swap_horiz</span> ${t.r1_title}</div>
          <p class="rule-text">▶️ ${t.r1_desc1}</p>
          <p class="rule-text">▶️ ${t.r1_desc2}</p>
          <div class="tokens-box">
            ${t.r1_tokens}
          </div>
        </div>

        <div class="card rule-section">
          <div class="rule-title" style="color:#f59e0b;"><span class="material-symbols-outlined">family_restroom</span> ${t.r2_title}</div>
          <p class="rule-text">▶️ ${t.r2_desc1}</p>
          <p class="rule-text">▶️ ${t.r2_desc2}</p>
          <p class="rule-text">▶️ ${t.r2_steal}</p>
        </div>

        <div class="card rule-section">
          <div class="rule-title" style="color:#a855f7;"><span class="material-symbols-outlined">bolt</span> ${t.r3_title}</div>
          <p class="rule-text">▶️ ${t.r3_desc1}</p>
          <p class="rule-text">▶️ ${t.r3_desc2}</p>
        </div>
      `;
      document.getElementById('rules-content').innerHTML = content;
    }

    document.getElementById('btn-lang-rules').addEventListener('click', () => {
      currentLang = currentLang === 'ar' ? 'en' : 'ar';
      document.documentElement.lang = currentLang;
      document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
      renderRules();
    });

    document.getElementById('btn-theme-rules').addEventListener('click', () => {
      currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', currentTheme);
      const icon = document.querySelector('.theme-icon');
      icon.textContent = currentTheme === 'dark' ? 'light_mode' : 'dark_mode';
      try { localStorage.setItem('qool_theme', currentTheme); } catch(e) {}
    });
    
    // Check local storage for existing preferences
    try {
      const savedTheme = localStorage.getItem('qool_theme');
      if (savedTheme) {
        currentTheme = savedTheme;
        document.documentElement.setAttribute('data-theme', currentTheme);
        document.querySelector('.theme-icon').textContent = currentTheme === 'dark' ? 'light_mode' : 'dark_mode';
      }
      const savedLang = localStorage.getItem('qool_lang');
      if (savedLang) {
        currentLang = savedLang;
        document.documentElement.lang = currentLang;
        document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
      }
    } catch(e) {}

    renderRules();
  </script>
</body>
</html>
